spring.application.name=travelmind-ai

# ---------------------------------------------------------------------------
# AWS Bedrock credentials are read from the AWS credentials file at
#   C:\Users\<you>\.aws\credentials   (standard AWS location, NOT in this repo)
# via the default AWS credential provider chain -- so no secrets in the code.
# ---------------------------------------------------------------------------
spring.ai.bedrock.aws.region=us-east-1

# ---------------------------------------------------------------------------
# Model = Amazon Nova Micro (cheapest). We use the US cross-region inference
# profile id ("us." prefix) because Nova on-demand requires an inference profile.
# If you ever see an error mentioning "inference profile", this is the line to check.
# ---------------------------------------------------------------------------
spring.ai.bedrock.converse.chat.options.model=us.amazon.nova-lite-v1:0
spring.ai.bedrock.converse.chat.options.temperature=0.2

# JWT signing secret -- override via the JWT_SECRET env var in real environments (must be >= 32 chars).
security.jwt.secret=${JWT_SECRET:travelmind-dev-only-secret-change-me-minimum-32-characters}

# Demo login credentials -- override via DEMO_USERNAME / DEMO_PASSWORD env vars.
security.demo.username=${DEMO_USERNAME:hemanth}
security.demo.password=${DEMO_PASSWORD:password}


# --- Resilience4j: Retry for the "bedrock" calls ---
resilience4j.retry.instances.bedrock.max-attempts=3
resilience4j.retry.instances.bedrock.wait-duration=1s
resilience4j.retry.instances.bedrock.enable-exponential-backoff=true
resilience4j.retry.instances.bedrock.exponential-backoff-multiplier=2

# --- Resilience4j: Circuit Breaker for the "bedrock" calls ---
resilience4j.circuitbreaker.instances.bedrock.sliding-window-size=10
resilience4j.circuitbreaker.instances.bedrock.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.bedrock.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.bedrock.permitted-number-of-calls-in-half-open-state=3